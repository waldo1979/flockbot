# Production compose file for the Raspberry Pi.
# Place this at ~/flockbot/docker-compose.yml on the Pi.
#
# Required: create ~/flockbot/.env with:
#   DISCORD_TOKEN=...
#   PUBG_API_KEY=...
#
# Auto-updates: install the cron job from scripts/update-cron.sh

services:
  flockbot:
    image: ghcr.io/waldo1979/flockbot:latest
    env_file: .env
    environment:
      - DATABASE_PATH=data/flockbot.db
    volumes:
      - flockbot-data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  flockbot-data:
